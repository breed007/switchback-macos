name: Switchback
options:
  bundleIdPrefix: com.breed007
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "YA83Q8FTH3"   # Brian Reed — Developer ID signing/notarization

targets:
  Switchback:
    type: application
    platform: macOS
    sources:
      - path: Switchback
    settings:
      base:
        PRODUCT_NAME: Switchback
        PRODUCT_BUNDLE_IDENTIFIER: com.breed007.switchback
        INFOPLIST_FILE: Switchback/Info.plist
        ENABLE_HARDENED_RUNTIME: YES     # required for notarization
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # NOTE: Switchback is intentionally NOT sandboxed — the privileged
    # SCPreferences commit (location switch) cannot run inside the App Sandbox.
    # Distribution is GitHub + Homebrew, not the Mac App Store.
